<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Tarjeta de Perfil</title>
  <style>
    /* Estilos base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #a69b1f;
      display: flex; /* 1. Uso de flex para centrar la tarjeta */
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      padding: 20px;
    }
    
    /* ↓ CSS DEL TALLER ↓ */
    
    .tarjeta {
      background: rgb(255, 255, 255);
      width: 100%;
      max-width: 350px;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      
      display: flex; /* 2. Contenedor principal flex */
      flex-direction: column; /* Requerimiento: Dirección en columna */
      align-items: center; /* Alineación central horizontal */
      gap: 20px; /* Requerimiento: Espaciado constante */
    }

    /* Sección superior */
    .perfil-header {
      display: flex; /* 3. Tercer contenedor flex */
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #d7a21b;
      object-fit: cover;
    }

    .nombre-usuario h2 {
      font-size: 1.4rem;
      color: #1f2937;
    }

    .nombre-usuario span {
      color: #6b7280;
      font-size: 0.9rem;
    }

    .bio {
      font-size: 0.95rem;
      color: #4b5563;
      text-align: center;
      line-height: 1.4;
    }

    /* Estadísticas */
    .estadisticas {
      display: flex;
      width: 100%;
      justify-content: space-around; /* Requerimiento: justify-content (valor 1) */
      padding: 15px 0;
      border-top: 1px solid #f3f4f6;
      border-bottom: 1px solid #f3f4f6;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-num {
      font-weight: bold;
      color: #111827;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #164aa2;
      text-transform: uppercase;
    }

    /* Botones de acción */
    .botones {
      display: flex;
      width: 100%;
      gap: 10px;
    }

    .btn {
      flex: 1; /* Requerimiento: Uso de flex: 1 para que ocupen el mismo ancho */
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-seguir { background: #d7a21b; color: white; }
    .btn-mensaje { background: #f3f4f6; color: #d7a21b; }
    .btn:hover { opacity: 0.8; }

    /* Miniaturas de proyectos */
    .miniaturas {
      display: flex;
      flex-wrap: wrap; /* Requerimiento: Permitir que bajen si no caben */
      justify-content: center; /* Requerimiento: justify-content (valor 2) */
      gap: 8px;
      margin-top: 5px;
    }

    .miniaturas img {
      width: 80px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      background: #ed2323;
    }

  </style>
</head>
